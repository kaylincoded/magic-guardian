name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test ./internal/... -race -count=1 -v

      - name: Test with coverage
        run: |
          go test ./internal/... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-arm64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            artifact: magic-guardian-darwin-amd64
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            artifact: magic-guardian-darwin-arm64
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-windows-amd64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install cross-compilation tools
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
          CC: ${{ matrix.goos == 'linux' && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/magic-guardian/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Cross-compile Go binary for Android arm64
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang
          CXX: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++
        run: |
          go build -ldflags="-s -w" \
            -o android/app/src/main/jniLibs/arm64-v8a/libguardian.so \
            ./cmd/magic-guardian/

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: magic-guardian-android.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android binary
        uses: actions/upload-artifact@v7
        with:
          name: magic-guardian-android-arm64
          path: android/app/src/main/jniLibs/arm64-v8a/libguardian.so


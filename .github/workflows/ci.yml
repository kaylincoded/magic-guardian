name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test ./internal/... -race -count=1 -v

      - name: Test with coverage
        run: |
          go test ./internal/... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-arm64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            artifact: magic-guardian-darwin-amd64
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            artifact: magic-guardian-darwin-arm64
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install cross-compilation tools
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'windows' && '0' || '1' }}
          CC: ${{ matrix.goos == 'linux' && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/magic-guardian/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test with race detector
        run: go test ./internal/... -race -count=1

  build-desktop:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            artifact: magic-guardian-linux-arm64
            cc: aarch64-linux-gnu-gcc
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            artifact: magic-guardian-darwin-amd64
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            artifact: magic-guardian-darwin-arm64
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            artifact: magic-guardian-windows-amd64.exe
            cgo: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install cross-compilation tools
        if: matrix.cc != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo || '1' }}
          CC: ${{ matrix.cc || '' }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/magic-guardian/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"

      - name: Cross-compile Go binary for Android arm64
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang
          CXX: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++
        run: |
          go build -ldflags="-s -w" \
            -o android/app/src/main/jniLibs/arm64-v8a/libguardian.so \
            ./cmd/magic-guardian/

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: magic-guardian-android.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android binary
        uses: actions/upload-artifact@v4
        with:
          name: magic-guardian-android-arm64
          path: android/app/src/main/jniLibs/arm64-v8a/libguardian.so

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/magic-guardian-linux-amd64/magic-guardian-linux-amd64 release-files/
          cp artifacts/magic-guardian-linux-arm64/magic-guardian-linux-arm64 release-files/
          cp artifacts/magic-guardian-darwin-amd64/magic-guardian-darwin-amd64 release-files/
          cp artifacts/magic-guardian-darwin-arm64/magic-guardian-darwin-arm64 release-files/
          cp artifacts/magic-guardian-windows-amd64.exe/magic-guardian-windows-amd64.exe release-files/
          cp artifacts/magic-guardian-android-arm64/libguardian.so release-files/magic-guardian-android-arm64
          cp artifacts/magic-guardian-android.apk/app-debug.apk release-files/magic-guardian-android.apk
          chmod +x release-files/magic-guardian-*
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          generate_release_notes: true
